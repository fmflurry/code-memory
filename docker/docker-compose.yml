services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: cm-falkordb
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - falkor_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cm-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  falkor_data:
  qdrant_data:
